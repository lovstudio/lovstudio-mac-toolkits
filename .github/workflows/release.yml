name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v0.1.0"
        required: true
  push:
    tags:
      - "v0.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.id }}
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Resolve tag
        id: vars
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: echo "tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.tag }}

      - name: Extract release notes
        id: notes
        shell: bash
        env:
          APP_NAME: "Lovstudio Mac Toolkits"
          RELEASE_TAG: ${{ steps.vars.outputs.tag }}
          HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_SIGNING_IDENTITY != '' && secrets.APPLE_ID != '' && secrets.APPLE_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
        run: |
          set -euo pipefail
          VERSION_NUM="${RELEASE_TAG#v}"

          awk -v ver="$VERSION_NUM" '
            /^## / { if (found) exit; if ($2 == ver) { found=1; next } }
            found { print }
          ' CHANGELOG.md > notes.md || true

          if [ ! -s notes.md ]; then
            printf 'Release %s\n' "$RELEASE_TAG" > notes.md
          fi

          if [ "$HAS_APPLE_SIGNING" != "true" ]; then
            {
              printf '\n---\n\n'
              printf '**macOS note**: This build is not Developer ID signed yet. On first launch, macOS may require manual approval.\n'
            } >> notes.md
          fi

          delimiter="EOF_notes_$(date +%s)"
          {
            printf 'notes<<%s\n' "$delimiter"
            cat notes.md
            printf '%s\n' "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: Lovstudio Mac Toolkits ${{ steps.vars.outputs.tag }}
          draft: true
          prerelease: false
          body: ${{ steps.notes.outputs.notes }}

  build-tauri:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.create-release.outputs.tag }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build universal macOS bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: --target universal-apple-darwin

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.create-release.outputs.tag }}" \
            --repo "${{ github.repository }}" \
            --draft=false \
            --latest
